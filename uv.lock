    { name = "rdflib" },
    { name = "tqdm" },
]

[package.dev-dependencies]
dev = [
    { name = "build" },
    { name = "mypy" },
    { name = "pytest" },
    { name = "ruff" },
    { name = "types-tqdm" },
]

[package.metadata]
requires-dist = [
    { name = "click", specifier = ">=8.2,<9" },
    { name = "rdflib", specifier = ">=7,<8" },
    { name = "tqdm", specifier = ">=4.65,<5" },
]

[package.metadata.requires-dev]
dev = [
    { name = "build", specifier = ">=1,<2" },
    { name = "mypy", specifier = ">=1,<2" },
    { name = "pytest", specifier = ">=9.0.3,<10" },
    { name = "ruff", specifier = ">=0.2,<2" },
    { name = "types-tqdm", specifier = ">=4.65,<5" },
]
